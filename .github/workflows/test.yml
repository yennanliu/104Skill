name: Plugin CI/CD Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate plugin file structure & JSON
  # ─────────────────────────────────────────────
  validate:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Checking required files ==="
          test -f SKILL.md                              && echo "OK  SKILL.md"
          test -f install.sh                            && echo "OK  install.sh"
          test -f .claude-plugin/plugin.json            && echo "OK  .claude-plugin/plugin.json"
          test -f .claude-plugin/marketplace.json       && echo "OK  .claude-plugin/marketplace.json"
          test -f skills/104-job-auto-apply/SKILL.md    && echo "OK  skills/104-job-auto-apply/SKILL.md"
          echo "All required files present."

      - name: Validate JSON — plugin.json
        run: |
          echo "=== Validating .claude-plugin/plugin.json ==="
          jq . .claude-plugin/plugin.json

      - name: Validate JSON — marketplace.json
        run: |
          echo "=== Validating .claude-plugin/marketplace.json ==="
          jq . .claude-plugin/marketplace.json

  # ─────────────────────────────────────────────
  # Job 2: Install Playwright MCP globally & run install.sh
  # ─────────────────────────────────────────────
  test-install:
    name: Test install.sh (with Playwright MCP auto-install)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run install.sh (auto-installs Playwright MCP if missing)
        run: |
          chmod +x install.sh
          ./install.sh

      - name: Verify Playwright MCP is installed globally
        run: |
          echo "=== Playwright MCP global install check ==="
          npm list -g @playwright/mcp --depth=0

      - name: Verify skill was installed
        run: |
          echo "=== Checking skill installation ==="
          test -f ~/.claude/skills/104-job-auto-apply/SKILL.md
          echo "Skill installed at: ~/.claude/skills/104-job-auto-apply/"
          ls -la ~/.claude/skills/104-job-auto-apply/

  # ─────────────────────────────────────────────
  # Job 3: Simulate full plugin command workflow
  #   /plugin marketplace add yennanliu/104Skill
  #   /plugin install 104-job-auto-apply
  #   /plugin list
  #   /104-job-auto-apply  (verify skill file is accessible)
  # ─────────────────────────────────────────────
  test-plugin-workflow:
    name: Test Plugin Command Workflow
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Simulate: /plugin marketplace add yennanliu/104Skill
      - name: "Simulate: /plugin marketplace add yennanliu/104Skill"
        run: |
          echo "=== /plugin marketplace add yennanliu/104Skill ==="
          mkdir -p ~/.claude/marketplaces
          cp .claude-plugin/marketplace.json ~/.claude/marketplaces/yennanliu-104Skill.json
          echo "Marketplace registered:"
          jq '.name, .version' ~/.claude/marketplaces/yennanliu-104Skill.json

      # Simulate: /plugin install 104-job-auto-apply
      - name: "Simulate: /plugin install 104-job-auto-apply"
        run: |
          echo "=== /plugin install 104-job-auto-apply ==="
          mkdir -p ~/.claude/skills/104-job-auto-apply
          cp skills/104-job-auto-apply/SKILL.md ~/.claude/skills/104-job-auto-apply/
          echo "Plugin installed."

      # Simulate: /plugin list
      - name: "Simulate: /plugin list"
        run: |
          echo "=== /plugin list ==="
          echo "Installed plugins:"
          ls -1 ~/.claude/skills/
          echo "---"
          for d in ~/.claude/skills/*/; do
            name=$(basename "$d")
            echo "  - $name"
          done

      # Verify: /104-job-auto-apply — skill file must be readable
      - name: "Verify: /104-job-auto-apply skill is accessible"
        run: |
          echo "=== /104-job-auto-apply (skill file check) ==="
          SKILL_FILE="$HOME/.claude/skills/104-job-auto-apply/SKILL.md"
          test -f "$SKILL_FILE"
          echo "SKILL.md is present and readable."
          echo ""
          echo "--- First 30 lines of SKILL.md ---"
          head -30 "$SKILL_FILE"
          echo "---"
          echo "Skill verification passed."

  # ─────────────────────────────────────────────
  # Job 4: Auto-update & deploy to Claude Marketplace
  #
  #   On every passing push to main this job will:
  #     1. Guard against re-running on its own version-bump commit
  #     2. Bump the patch version in plugin.json + marketplace.json
  #     3. Commit & push the bump with [skip ci] (no infinite loop)
  #     4. Create a new GitHub Release — the marketplace artifact that
  #        powers: /plugin marketplace add yennanliu/104Skill
  # ─────────────────────────────────────────────
  deploy-marketplace:
    name: Auto-Update & Deploy to Claude Marketplace
    runs-on: ubuntu-latest
    needs: [test-install, test-plugin-workflow]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout (full history, push-capable token)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Guard: skip if this commit is already the version bump ──────────
      - name: Guard — skip version-bump commits
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $MSG"
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version-bump commit detected — skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Bump patch version (e.g. 1.0.3 → 1.0.4) ────────────────────────
      - name: Bump patch version
        id: bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          OLD=$(jq -r '.version' .claude-plugin/plugin.json)
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)
          PATCH=$(echo "$OLD" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # Update plugin.json
          jq --arg v "$NEW" '.version = $v' \
            .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json

          # Update marketplace.json (top-level + plugins[0])
          jq --arg v "$NEW" '.version = $v | .plugins[0].version = $v' \
            .claude-plugin/marketplace.json > /tmp/marketplace.json
          mv /tmp/marketplace.json .claude-plugin/marketplace.json

          echo "old=$OLD"   >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped: $OLD → $NEW"

      # ── Commit & push version bump (tagged [skip ci]) ───────────────────
      - name: Commit & push version bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
          echo "Version bump pushed."

      # ── Create GitHub Release (= Claude Marketplace entry) ──────────────
      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false'
        run: |
          # Point the release tag at the bump commit we just pushed
          git pull origin main
          TAG="v${{ steps.bump.outputs.version }}"
          TARGET=$(git rev-parse HEAD)

          gh release create "$TAG" \
            --title "$TAG" \
            --target "$TARGET" \
            --latest \
            --notes "## What's new in $TAG

          Auto-released after all CI tests passed on \`main\`.

          ### Install / update via Claude Code
          \`\`\`
          /plugin marketplace add yennanliu/104Skill
          /plugin install 104-job-auto-apply
          /104-job-auto-apply
          \`\`\`

          See [CHANGELOG](https://github.com/yennanliu/104Skill/blob/main/CHANGELOG.md) for full release notes."

          echo ""
          echo "========================================="
          echo "Marketplace release published: $TAG"
          echo "Users can install / update with:"
          echo "  /plugin marketplace add yennanliu/104Skill"
          echo "  /plugin install 104-job-auto-apply"
          echo "========================================="
        env:
          GH_TOKEN: ${{ github.token }}
